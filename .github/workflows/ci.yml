name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --workspaces --if-present
      - name: Type check
        run: npm run typecheck --workspaces --if-present

  build:
    name: Build All Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build --workspace=packages/shared
      - name: Build services
        run: npm run build --workspaces --if-present

  test-auth-service:
    name: Test Auth Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run migrations
        working-directory: apps/auth-service
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_auth
      - name: Run tests
        run: npm run test --workspace=apps/auth-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_auth
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
          NODE_ENV: test

  test-project-service:
    name: Test Project Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_project
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run migrations
        working-directory: apps/project-service
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_project
      - name: Run tests
        run: npm run test --workspace=apps/project-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_project
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars
          NODE_ENV: test

  test-task-service:
    name: Test Task Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_task
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run migrations
        working-directory: apps/task-service
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_task
      - name: Run tests
        run: npm run test --workspace=apps/task-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_task
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars
          NODE_ENV: test

  test-client:
    name: Test Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run client tests
        run: npm run test:run --workspace=apps/client
        env:
          NODE_ENV: test

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Auth Service
        run: docker build -f apps/auth-service/Dockerfile -t pm-auth-service:${{ github.sha }} . --load
      - name: Build Project Service
        run: docker build -f apps/project-service/Dockerfile -t pm-project-service:${{ github.sha }} . --load
      - name: Build Task Service
        run: docker build -f apps/task-service/Dockerfile -t pm-task-service:${{ github.sha }} . --load
      - name: Build Realtime Service
        run: docker build -f apps/realtime-service/Dockerfile -t pm-realtime-service:${{ github.sha }} . --load
      - name: Build Client
        run: docker build -f apps/client/Dockerfile -t pm-client:${{ github.sha }} . --load
